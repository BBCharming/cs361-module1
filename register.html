<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Registration Foam</title>
    </head>
    <body>
        <form action="#" method="POST">
            <fieldset>
                <legend>Personal Details</legend>
                    <!--Full name (text, required), -->
                    <p>
                        <label for="full-name"> Full Name </label><br>
                        <input type="text" id="full-name" name="full_name" required>
                    </p>
                    <!--Email (email, required),-->
                    <p>
                        <label for="email"> Email </label><br>
                        <input type="email" id="email" name="email" required>
                    </p>
                    <!--Phone (tel)-->
                    <p>
                        <label for="phone"> Phone Number</label><br>
                        <input type="tel" id="phone" name="phone_number">
                    </p>
                    <!--Date of birth (date),-->
		    <p>
                        <label for="date"> Date Of Birth</label>
                        <input type="date" id="date" name="date">
		    </p>
                    <!--Gender (radio: Male/Female/Other),-->
                    <p>
                        <label> Gender</label><br>
                        <label for="male">Male</label>
                        <input type="radio" id="male" name="gender" value="Male"><br>
                        <label for="female">Female</label>
                        <input type="radio" id="female" name="gender" value="Female">
                    </p>
                    <!--Profile photo (file, accept image/*)-->
                    <p>
                        <label for="profile-photo">Upload Proflie Picture</label>
                        <input type="file" id="profile-photo" name="profile_photo"  accept="image/*">
                    </p>
            </fieldset>
            
            <fieldset>
                <legend>Academic Details</legend>
                <!--Student ID (text, pattern='[A-Z]{2}[0-9]{6}',required) : since cbu uses 6 digts numbers only, you can use pattern='[0-9]{6}'-->
                <p>
                    <label for="student-id">Student ID</label>
                    <input type="text" id="student-id" name="student_id"  pattern='[0-9]{8}' required>
                </p><br>
                <!--Programme (select: CS,IT, IS),-->
                <p>
                    <label for="programme">Programme</label>
                    <select id="programme" name="programme">
                        <option value="CS">CS</option>
                        <option value="IT">IT</option>
                        <option value="IS">IS</option>
                    </select>                    
                </p>
                <!--Year of study (number, min=1, max=5),-->
                <p>
                    <label for="year-of-study">Year Of Study</label>
                    <input type="number" id="year-of-study" name="year_of_study" min="1" max="5">
                </p><br>
                <!--Specialisation (checkbox: Web,Security, AI, Networks)-->
                <p> 
                    <label>Specialization</label><br>
                    <input type="checkbox" id="web"  name="specialization" value="Web">
                    <label for="web">Web</label><br>
                    <input type="checkbox" id="security" name="specialization" value="Security">
                    <label for="security">Security</label><br>
                    <input type="checkbox" id="ai" name="specialization" value="AI">
                    <label for="ai">AI</label><br>
                    <input type="checkbox" id="network" name="specialization" value="Networking">
                    <label for="network">Networking</label><br>
                </p>
		<!--A textarea for 'Tell us about yourself' (rows=4, required).-->
		<p>
                   <label for="about">Tell us about yourself</label><br>
	  	   <textarea id="about" name="about" rows="4" required>Text Area</textarea>
		</p>
		<!--A submit button and a reset button inside a <fieldset>. -->
	    </fieldset>
            <fieldset>
		<input type="submit" value="Submit">
		<input type="reset" value="Reset">
            </fieldset>
        </form>
    </body>
</html>
